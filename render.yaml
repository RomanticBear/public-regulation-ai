# Render Blueprint — GitHub 연동 후 "New > Blueprint" 로 한 번에 생성 가능
# 환경 변수(OPENAI_API_KEY, DATABASE_URL)는 Render 대시보드에서 직접 입력하세요.

services:
  - type: web
    name: public-regulation-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_SSL_VERIFY
        value: "true"
      - key: DATABASE_SSL_VERIFY
        value: "true"
      - key: SUPABASE_DB_MODE
        value: pooler
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
